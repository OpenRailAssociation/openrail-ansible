# UFW
ufw_rules:
  - rule: allow
    to_port: 22
    protocol: tcp
    comment: "SSH"
  - rule: allow
    to_port: 80
    comment: "HTTP"
  - rule: allow
    to_port: 443
    comment: "HTTPS"
  - rule: allow
    to_port: "{{ nextcloud_talk_port }}"
    protocol: tcp
    comment: "STUN TCP"
  - rule: allow
    to_port: "{{ nextcloud_talk_port }}"
    protocol: udp
    comment: "STUN UDP"

# CERTBOT
certbot_create_if_missing: true
certbot_admin_email: techadmin@openrailassociation.org
certbot_certs:
  - domains:
      - "{{ nextcloud_talk_host }}"

# NGINX
nginx_remove_default_vhost: true
nginx_extra_http_options: |
  proxy_max_temp_file_size 0;
nginx_upstreams:
  - name: nc-talk-hpb
    servers:
      - "127.0.0.1:8181"
nginx_vhosts:
  # Nextcloud Talk HPB
  - listen: "443 http2 ssl"
    server_name: "{{ nextcloud_talk_host }}"
    access_log: "/var/log/nginx/nc-talk-hpb-access.log"
    error_log: "/var/log/nginx/nc-talk-hpb-error.log"
    filename: "nc-talk-hpb-ssl.conf"
    extra_parameters: |
      ssl_certificate /etc/letsencrypt/live/{{ nextcloud_talk_host }}/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/{{ nextcloud_talk_host }}/privkey.pem;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_ciphers HIGH:!aNULL:!MD5;
      location /standalone-signaling/ {
        proxy_pass http://nc-talk-hpb/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location /standalone-signaling/spreed {
          proxy_pass http://nc-talk-hpb/spreed;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
  - listen: "80"
    server_name: "{{ nextcloud_talk_host }}"
    return: "301 https://$host$request_uri"
    filename: "nc-talk-hpb.conf"

